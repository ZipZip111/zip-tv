name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (compile + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Compile + unit tests
        run: |
          chmod +x gradlew
          ./gradlew compileDebugKotlin testDebugUnitTest --console=plain --stacktrace
