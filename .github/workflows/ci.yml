name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc -b --noEmit

      - name: Unit tests (vitest run)
        run: npx vitest run

  android:
    name: Android (compile + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-native
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ubuntu-latest ships a preinstalled Android SDK (ANDROID_HOME set);
      # gradle pulls any missing platform/build-tools itself. The
      # android-actions/setup-android action is avoided — its emulator
      # package download is flaky and the emulator isn't needed to compile.

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Compile + unit tests
        run: |
          chmod +x gradlew
          ./gradlew compileDebugKotlin testDebugUnitTest --console=plain --stacktrace

  worker:
    name: Cloudflare workers (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax check worker scripts
        run: |
          node --check cloudflare-config/worker.js
          node --check web/cloudflare/worker.js
